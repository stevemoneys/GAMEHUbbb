<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 | Match</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="game-page">
    <main class="app">
        <section class="game-shell" aria-label="Connect Four Board Area">
            <header class="game-topbar">
                <a class="icon-btn icon-btn--home" href="index.html" aria-label="Home">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                        <path d="M12 3 2 11h2v10h6v-6h4v6h6V11h2Z"/>
                    </svg>
                </a>

                <div class="effects-bar" aria-label="Effects">
                    <button id="effectUndoBtn" class="effect-btn" type="button" aria-label="Undo">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M7 7V3L2 8l5 5V9h5a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7Z"/></svg>
                        <span id="effectUndoCount" class="effect-count-badge">0</span>
                    </button>
                    <button id="effectHintBtn" class="effect-btn" type="button" aria-label="Hint">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M9 21h6v-1H9Zm3-19a7 7 0 0 0-4 12.75V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.25A7 7 0 0 0 12 2Z"/></svg>
                        <span id="effectHintCount" class="effect-count-badge">0</span>
                    </button>
                    <button id="effectThreatBtn" class="effect-btn" type="button" aria-label="Threat Alert">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M1 21h22L12 2Zm12-3h-2v2h2Zm0-8h-2v6h2Z"/></svg>
                        <span id="effectThreatCount" class="effect-count-badge">0</span>
                    </button>
                    <button id="effectSafeBtn" class="effect-btn" type="button" aria-label="Safe Move">
                        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5Zm-1 14-4-4 1.4-1.4L11 13.2l4.6-4.6L17 10Z"/></svg>
                        <span id="effectSafeCount" class="effect-count-badge">0</span>
                    </button>
                </div>

                <button class="icon-btn icon-btn--restart" id="restartBtn" type="button" aria-label="Restart">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                        <path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7Z"/>
                    </svg>
                </button>
            </header>

            <div id="turnTimer" class="turn-timer" aria-live="polite" aria-label="Turn timer">
                <span id="turnTimerValue">10</span>
            </div>

            <div id="rewardToast" class="reward-toast" aria-live="polite"></div>

            <div id="resultModal" class="result-modal" aria-hidden="true">
                <div class="result-modal__card">
                    <h2 id="resultTitle">Victory</h2>
                    <p id="resultBody">You cleared the stage.</p>
                    <div class="result-actions">
                        <button id="resultNextBtn" class="result-btn result-btn--next" type="button">Next Level</button>
                        <button id="resultPlayAgainBtn" class="result-btn result-btn--play" type="button">Play Again</button>
                        <button id="resultCancelBtn" class="result-btn result-btn--cancel" type="button">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="players" role="status" aria-live="polite" aria-label="Active player">
                <div id="playerRed" class="player-chip player-chip--red player-chip--active">Red</div>
                <div id="playerYellow" class="player-chip player-chip--yellow">Yellow</div>
            </div>

            <div class="board-wrap">
                <div id="columnHints" class="column-hints" aria-hidden="true"></div>
                <div id="board" class="board" role="grid" aria-label="Connect Four board"></div>
                <div class="board-stand" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <script src="theme-config.js"></script>
    <script src="settings-config.js"></script>
    <script src="progression.js"></script>
    <script src="economy.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
